server:
  port: 8080

spring:
  application:
    name: enviro365-withdrawals

  datasource:
    url: jdbc:h2:mem:enviro365db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
    
logging:
  level:
    com.enviro.assessment.junior.xolanimbambo: DEBUG